name: Extract Name from PDF

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually run the action from the GitHub UI

jobs:
  extract-pdf-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gdown PyPDF2

      - name: Run Extraction Script
        run: python extract_name.py
