name: Training Letter

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'URL of the PDF to process'
        required: true
        default: 'https://drive.google.com/file/d/1rd5eRjpcnYwfJUSfq84Rtl2M6R4Pw70Q/view?usp=drive_link'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pdfplumber pandas

      - name: Download PDF
        run: |
          # Handle Google Drive URL
          FILE_ID=$(echo "${{ github.event.inputs.pdf_url }}" | grep -oP '(?<=/d/)[^/]*')
          wget --no-check-certificate "https://docs.google.com/uc?export=download&id=${FILE_ID}" -O polling_letters.pdf

      - name: Extract data
        run: |
          python Training.py polling_letters.csv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polling-officers-csv
          path: polling_officers.csv
