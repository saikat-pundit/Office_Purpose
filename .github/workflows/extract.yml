name: Extract PDF Data from Drive to CSV

on:
  push:
    paths:
      - 'extract_data.py'
  workflow_dispatch: # Allows you to run this manually from the Actions tab
  schedule:
    - cron: '0 0 * * *' # Optional: Runs automatically once a day at midnight UTC

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyPDF2 gdown

      - name: Run Extraction Script
        run: python extract_data.py

      - name: Commit and Push CSV
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate data.csv from Google Drive PDF"
          file_pattern: 'data.csv'
